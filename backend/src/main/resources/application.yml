server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

requirement:
  analyzer:
    mode: ${REQUIREMENT_ANALYZER_MODE:rule-based}

wfm:
  generation:
    mode: ${WFM_GENERATION_MODE:${REQUIREMENT_ANALYZER_MODE:rule-based}}
    version: ${WFM_VERSION:2.0}
    allow-fallback: ${WFM_GENERATION_ALLOW_FALLBACK:false}
  service:
    base-url: ${WFM_SERVICE_BASE_URL:http://localhost:8001}
    timeout-ms: ${WFM_SERVICE_TIMEOUT_MS:70000}

ai:
  provider: ${AI_PROVIDER:openrouter}
  model: ${AI_MODEL:deepseek/deepseek-chat}
  api-key: ${AI_API_KEY:}
  timeout-ms: ${AI_TIMEOUT_MS:60000}
  max-output-tokens: ${AI_MAX_OUTPUT_TOKENS:4096}
  temperature: ${AI_TEMPERATURE:0.2}
  fallback-to-rule-based: ${AI_FALLBACK_TO_RULE_BASED:true}
  cache:
    enabled: ${AI_CACHE_ENABLED:true}
    ttl-days: ${AI_CACHE_TTL_DAYS:30}
  prompt-version: ${AI_PROMPT_VERSION:requirement-to-wfm-v1}
  openrouter:
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    api-key: ${OPENROUTER_API_KEY:}
    default-model: ${OPENROUTER_DEFAULT_MODEL:deepseek/deepseek-chat}
    fallback-models:
      - ${OPENROUTER_FALLBACK_MODEL_1:qwen/qwen3-32b:nitro}
      - ${OPENROUTER_FALLBACK_MODEL_2:deepseek/deepseek-chat-v3-0324}
    temperature: ${OPENROUTER_TEMPERATURE:0.2}
    max-completion-tokens: ${OPENROUTER_MAX_COMPLETION_TOKENS:4096}
    timeout-seconds: ${OPENROUTER_TIMEOUT_SECONDS:60}

spring:
  application:
    name: req-pilot-backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:req_pilot}
    username: ${POSTGRES_USER:req_pilot}
    password: ${POSTGRES_PASSWORD:req_pilot}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

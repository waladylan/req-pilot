services:
  frontend:
    build:
      context: ./frontend
    image: req-pilot-frontend:prod
    container_name: req-pilot-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - req-pilot
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    image: req-pilot-backend:prod
    container_name: req-pilot-backend
    depends_on:
      postgres:
        condition: service_healthy
      workflow-engine:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/${POSTGRES_DB:-req_pilot}}
      SPRING_DATASOURCE_USERNAME: ${DATABASE_USERNAME:-${POSTGRES_USER:-req_pilot}}
      SPRING_DATASOURCE_PASSWORD: ${DATABASE_PASSWORD:-${POSTGRES_PASSWORD:-req_pilot}}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      WORKFLOW_ENGINE_BASE_URL: http://workflow-engine:8001
      WFM_SERVICE_TIMEOUT_MS: ${WFM_SERVICE_TIMEOUT_MS:-70000}
      WFM_GENERATION_MODE: ${WFM_GENERATION_MODE:-AI}
      WFM_VERSION: ${WFM_VERSION:-2.0}
      WFM_GENERATION_ALLOW_FALLBACK: ${WFM_GENERATION_ALLOW_FALLBACK:-false}
      REQUIREMENT_ANALYZER_MODE: ${REQUIREMENT_ANALYZER_MODE:-ai}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      AI_MODEL: ${AI_MODEL:-deepseek/deepseek-chat}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-60000}
      AI_MAX_OUTPUT_TOKENS: ${AI_MAX_OUTPUT_TOKENS:-4096}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.2}
      AI_FALLBACK_TO_RULE_BASED: ${AI_FALLBACK_TO_RULE_BASED:-true}
      AI_CACHE_ENABLED: ${AI_CACHE_ENABLED:-true}
      AI_CACHE_TTL_DAYS: ${AI_CACHE_TTL_DAYS:-30}
      AI_PROMPT_VERSION: ${AI_PROMPT_VERSION:-requirement-to-wfm-v1}
    networks:
      - req-pilot
    restart: unless-stopped

  workflow-engine:
    build:
      context: ./wfm-service
    image: req-pilot-workflow-engine:prod
    container_name: req-pilot-workflow-engine
    expose:
      - "8001"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-chat}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-4096}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      WFM_PROMPT_VERSION: ${WFM_PROMPT_VERSION:-wfm-v2-python-001}
      WFM_DEFAULT_VERSION: ${WFM_DEFAULT_VERSION:-2.0}
      WFM_SERVICE_PORT: 8001
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json, urllib.request; data=json.load(urllib.request.urlopen('http://localhost:8001/health', timeout=5)); raise SystemExit(0 if data.get('status') == 'UP' else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - req-pilot
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: req-pilot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-req_pilot}
      POSTGRES_USER: ${POSTGRES_USER:-req_pilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-req_pilot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-req_pilot} -d ${POSTGRES_DB:-req_pilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - req-pilot
    restart: unless-stopped

networks:
  req-pilot:
    driver: bridge

volumes:
  postgres_data:
